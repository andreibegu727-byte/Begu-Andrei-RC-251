<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proba Layout - Ziua 4 | Flexbox & Grid</title>
  
  <style>
    /* =====================================================
       RESET & BAZĂ
    ===================================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      padding: 40px 20px;
      color: #333;
    }

    h2 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 1.4rem;
      color: #1a202c;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    section {
      margin-bottom: 60px;
    }

    /* =====================================================
       SECȚIUNEA A: PROVOCAREA FLEXBOX
       Scop: Poziționarea geometrică a 3 div-uri în colțuri
             și centrul unui container de 80vh.
    ===================================================== */

    .flexbox-container {
      /* 
        Folosim display: flex pentru a activa Flexbox.
        Înălțimea de 80vh = 80% din înălțimea ferestrei.
        Bordura dublă este realizată cu border-style: double.
      */
      display: flex;

      /* 
        flex-wrap: wrap permite elementelor să treacă pe
        rânduri noi, necesar pentru align-content.
      */
      flex-wrap: wrap;

      height: 80vh;
      border: 6px double #4a90d9;
      background: #e8f0fe;
      position: relative;
      border-radius: 8px;
      overflow: hidden;
    }

    .box-1,
    .box-2,
    .box-3 {
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1rem;
      border-radius: 8px;
      color: white;
    }

    /* 
      .box-1: STÂNGA-SUS
      align-self: flex-start plasează elementul la ÎNCEPUTUL
      axei transversale (sus). Deoarece containerul are
      flex-wrap: wrap, .box-1 ocupă primul rând în stânga.
    */
    .box-1 {
      background: #e53e3e;
      align-self: flex-start;
      /* margin-right: auto împinge elementele rămase spre dreapta,
         lăsând .box-1 ancorată în stânga */
      margin-right: auto;
    }

    /* 
      .box-2: CENTRU PERFECT (pe ambele axe)
      Strategia: scoatem elementul din fluxul normal cu
      position: absolute și îl centrăm cu transform: translate.
      Aceasta este cea mai fiabilă metodă de centrare absolută.
    */
    .box-2 {
      background: #38a169;
      position: absolute;
      top: 50%;
      left: 50%;
      /* 
        transform: translate(-50%, -50%) mută elementul
        cu -50% din propria sa lățime și înălțime,
        centrând-ul perfect față de punctul (50%, 50%).
      */
      transform: translate(-50%, -50%);
    }

    /* 
      .box-3: DREAPTA-JOS
      align-self: flex-end plasează elementul la SFÂRȘITUL
      axei transversale (jos). margin-left: auto îl împinge
      la extrema dreaptă a rândului.
    */
    .box-3 {
      background: #805ad5;
      align-self: flex-end;
      margin-left: auto;
    }

    /* =====================================================
       SECȚIUNEA B: PROVOCAREA GRID - SISTEMUL "MOZAIC"
       Scop: Layout cu primul element pe 2 coloane,
             restul în coloane egale.
    ===================================================== */

    .grid-container {
      /* 
        display: grid activează CSS Grid.
        repeat(2, 1fr) creează 2 coloane de lățime egală
        (1fr = 1 fracțiune din spațiul disponibil).
      */
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 25px; /* exact 25px conform cerinței */
      background: rgba(74, 144, 217, 0.08);
      padding: 25px;
      border-radius: 12px;
      border: 2px solid rgba(74, 144, 217, 0.3);
    }

    .grid-item {
      background: rgba(255, 255, 255, 0.85);
      border-radius: 10px;
      padding: 30px;
      font-weight: 600;
      font-size: 1.1rem;
      text-align: center;
      color: #2d3748;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 
      .item-1 ocupă 2 coloane:
      grid-column: 1 / 3 înseamnă "de la linia de grilă 1
      până la linia 3", adică ambele coloane disponibile.
      Alternativ: grid-column: span 2; (mai lizibil)
    */
    .item-1 {
      grid-column: span 2;
      background: linear-gradient(135deg, rgba(74,144,217,0.15), rgba(128,90,213,0.15));
      color: #1a202c;
      font-size: 1.2rem;
    }

    .item-2 { background: rgba(56, 161, 105, 0.1); color: #276749; }
    .item-3 { background: rgba(229, 62, 62, 0.1);  color: #9b2c2c; }
    .item-4 { background: rgba(128, 90, 213, 0.1); color: #553c9a; }

  </style>
</head>
<body>

  <!-- =====================================================
       SECȚIUNEA A: FLEXBOX - POZIȚIONARE GEOMETRICĂ
  ====================================================== -->
  <section>
    <h2>A. Provocarea Flexbox — Poziționare Geometrică</h2>

    <div class="flexbox-container">

      <!-- 
        .box-1 rămâne în stânga-sus prin:
        - align-self: flex-start (sus pe axa Y)
        - margin-right: auto (stânga pe axa X)
      -->
      <div class="box-1">Box 1<br>↖ Stânga-Sus</div>

      <!-- 
        .box-2 este centrat perfect prin:
        - position: absolute cu top: 50%, left: 50%
        - transform: translate(-50%, -50%) pentru ajustare precisă
        Aceasta "rupe" alinierea standard scoțând elementul
        din flux și centrându-l geometric față de container.
      -->
      <div class="box-2">Box 2<br>⊕ Centru</div>

      <!-- 
        .box-3 stă în dreapta-jos prin:
        - align-self: flex-end (jos pe axa Y)
        - margin-left: auto (dreapta pe axa X)
        Combinația margin: auto cu align-self este o tehnică
        puternică de a "rupe" alinierea standard fără
        a folosi poziționare absolută.
      -->
      <div class="box-3">Box 3<br>↘ Dreapta-Jos</div>

    </div>
  </section>

  <!-- =====================================================
       SECȚIUNEA B: GRID - SISTEMUL "MOZAIC"
  ====================================================== -->
  <section>
    <h2>B. Provocarea Grid — Sistemul de "Mozaic"</h2>

    <div class="grid-container">

      <!-- 
        item-1 ocupă ambele coloane (grid-column: span 2).
        Funcționează ca un "banner" deasupra celorlalte celule.
      -->
      <div class="grid-item item-1">Item 1 — Ocupă 2 Coloane (Lățime Completă)</div>

      <!-- 
        item-2 și item-3 stau pe rândul al doilea în coloane egale.
        Coloanele sunt egale deoarece grid-template-columns: repeat(2, 1fr)
        împarte spațiul în 2 fracțiuni identice.
      -->
      <div class="grid-item item-2">Item 2 — Coloana 1</div>
      <div class="grid-item item-3">Item 3 — Coloana 2</div>

      <!-- item-4 pe rândul al treilea, centrat pe o coloană -->
      <div class="grid-item item-4">Item 4 — Bonus</div>

    </div>
  </section>

</body>
</html>
