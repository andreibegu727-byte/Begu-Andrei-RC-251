# Configuratia de Securitate si Redirectionare la Nivel de Edge
# Configurat de: Begu Andrei | RC251 | 15.05.2026

[[redirects]]
  from   = "http://*"
  to     = "https://:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self';"
    Referrer-Policy            = "strict-origin-when-cross-origin"
